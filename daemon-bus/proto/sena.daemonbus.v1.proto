syntax = "proto3";

package sena.daemonbus.v1;

// ─────────────────────────────────────────────────────────────────────────────
// Boot Signals
// ─────────────────────────────────────────────────────────────────────────────

// Every subsystem signals daemon-bus when it is truly ready — not just started.
// The boot sequence is ordered per PRD §3.2. daemon-bus tracks each signal and
// halts boot if a required subsystem fails within its configured timeout.

enum BootSignal {
  BOOT_SIGNAL_UNSPECIFIED = 0;
  DAEMON_BUS_READY = 1;
  MEMORY_ENGINE_READY = 2;
  PLATFORM_READY = 3;
  AGENTS_READY = 4;
  reserved 5;
  reserved "OLLAMA_READY";
  MODEL_PROFILE_READY = 6;
  LORA_READY = 7;
  LORA_SKIPPED = 8;
  CTP_READY = 9;
  UI_READY = 10;
  SENA_READY = 11;
  // Inference subsystem lifecycle signals.
  INFERENCE_READY = 12;        // Model is loaded and ready to serve completions.
  INFERENCE_UNAVAILABLE = 13;  // Model switching in progress or unrecoverable error.
  INFERENCE_DEGRADED = 14;     // OOM or partial failure; partial recovery in progress.
  // SoulBox signals.
  SOULBOX_READY = 15;          // Schema loaded and encryption verified.
}

message BootSignalRequest {
  // Which subsystem is signaling ready.
  string subsystem_id = 1;
  // The boot signal being emitted.
  BootSignal signal = 2;
}

message BootSignalResponse {
  bool acknowledged = 1;
}

message BootStatusRequest {}

message BootStatusResponse {
  // Map of subsystem_id to the boot signal it has reached.
  map<string, BootSignal> subsystem_signals = 1;
  // True only when all required subsystems have signaled ready and SENA_READY is emitted.
  bool sena_ready = 2;
}

service BootService {
  // Called by each subsystem when it is truly ready.
  rpc SignalReady(BootSignalRequest) returns (BootSignalResponse);
  // Query current boot status — useful for UI and diagnostics.
  rpc GetBootStatus(BootStatusRequest) returns (BootStatusResponse);
}

// ─────────────────────────────────────────────────────────────────────────────
// Event Bus
// ─────────────────────────────────────────────────────────────────────────────

// Topic constants are defined here so generated code produces typed constants.
// All topic strings in Rust reference these — never string literals.

enum EventTopic {
  EVENT_TOPIC_UNSPECIFIED = 0;

  // Boot lifecycle
  TOPIC_BOOT_SIGNAL = 1;
  TOPIC_BOOT_FAILED = 2;

  // Subsystem supervision
  TOPIC_SUBSYSTEM_STARTED = 10;
  TOPIC_SUBSYSTEM_CRASHED = 11;
  TOPIC_SUBSYSTEM_RESTARTED = 12;
  TOPIC_SUBSYSTEM_DEGRADED = 13;

  // Priority arbitration
  TOPIC_ESCALATION_GRANTED = 20;
  TOPIC_ESCALATION_QUEUED = 21;
  TOPIC_ESCALATION_EXPIRED = 22;
  TOPIC_ESCALATION_RELEASED = 23;

  // Watchdog
  TOPIC_TASK_TIMEOUT = 30;
  TOPIC_TASK_TERMINATED = 31;

  // Memory engine events (published by memory-engine, consumed by others)
  TOPIC_MEMORY_UPDATED = 40;
  TOPIC_MEMORY_WRITE_COMPLETED = 41;
  TOPIC_MEMORY_TIER_PROMOTED = 42;

  // Model probe
  TOPIC_MODEL_PROBE_FAILED = 50;
  TOPIC_LORA_TRAINING_RECOMMENDED = 51;

  // User-facing reactive loop
  TOPIC_USER_MESSAGE_RECEIVED = 60;
  TOPIC_USER_MESSAGE_RESPONSE = 61;

  // CTP events
  TOPIC_THOUGHT_SURFACED = 62;               // A thought passed threshold and is ready to surface.
  TOPIC_SESSION_COMPACTION_TRIGGERED = 63;   // Session context has been compacted.
  TOPIC_MEMORY_CONSOLIDATION_REQUESTED = 64; // CTP requesting memory-engine to run consolidation.

  // Inference events
  TOPIC_INFERENCE_MODEL_SWITCHING = 65; // Model unload started; callers should expect UNAVAILABLE.

  // Agent registry events
  TOPIC_AGENT_REGISTERED = 66;  // A community agent passed review and was added to the registry.
  TOPIC_AGENT_QUARANTINED = 67; // A community agent failed review and was moved to quarantine.
}

message BusEvent {
  // Unique event identifier for tracing.
  string event_id = 1;
  // Topic this event is published to.
  EventTopic topic = 2;
  // Source subsystem that emitted the event.
  string source_subsystem = 3;
  // Arbitrary payload — subsystem-specific, encoded as bytes.
  // Receivers deserialize based on topic contract.
  bytes payload = 4;
  // OpenTelemetry trace context propagated with every cross-subsystem event.
  string trace_context = 5;
  // UTC timestamp in RFC 3339 format.
  string timestamp = 6;
}

message PublishRequest {
  BusEvent event = 1;
}

message PublishResponse {
  bool accepted = 1;
}

message SubscribeRequest {
  // Which topics the caller wants to receive. Empty means all topics.
  repeated EventTopic topics = 1;
  // Subscriber identity for logging and diagnostics.
  string subscriber_id = 2;
}

service EventBusService {
  // Publish an event to the bus. Fire-and-forget from the caller's perspective.
  rpc Publish(PublishRequest) returns (PublishResponse);
  // Subscribe to events. Server-streaming — daemon-bus pushes matching events.
  rpc Subscribe(SubscribeRequest) returns (stream BusEvent);
}

// ─────────────────────────────────────────────────────────────────────────────
// Priority Arbitration
// ─────────────────────────────────────────────────────────────────────────────

enum PriorityTier {
  PRIORITY_TIER_UNSPECIFIED = 0;
  CRITICAL = 1; // Tier 0 — daemon-bus only
  REACTIVE = 2; // Tier 1 — user-facing requests
  ESCALATED = 3; // Tier 2 — time-bounded, exclusive
  STANDARD = 4; // Tier 3 — normal agent operation
  BACKGROUND = 5; // Tier 4 — CTP default, telemetry
}

enum EscalationResult {
  ESCALATION_RESULT_UNSPECIFIED = 0;
  GRANTED = 1;
  QUEUED = 2;
  DENIED = 3;
}

message EscalationRequest {
  // Which subsystem is requesting escalation.
  string subsystem_id = 1;
  // The tier being requested. Only ESCALATED (Tier 2) can be requested.
  PriorityTier requested_tier = 2;
  // Why escalation is needed — logged for debugging and CTP pattern analysis.
  string reason = 3;
  // Maximum duration in milliseconds the subsystem expects to need escalation.
  // daemon-bus enforces a ceiling from config — this is a hint, not a guarantee.
  uint64 requested_duration_ms = 4;
  // Trace context for the operation driving this escalation.
  string trace_context = 5;
}

message EscalationResponse {
  EscalationResult result = 1;
  // Unique escalation ID — used to release or track expiry.
  string escalation_id = 2;
  // Actual granted duration in milliseconds. May be less than requested.
  uint64 granted_duration_ms = 3;
}

message ReleaseEscalationRequest {
  string escalation_id = 1;
  string subsystem_id = 2;
}

message ReleaseEscalationResponse {
  bool released = 1;
}

message ArbitrationStatusRequest {}

message ArbitrationStatusResponse {
  // Currently held Tier 2 escalation, if any.
  string current_tier_two_holder = 1;
  string current_escalation_id = 2;
  // Number of queued escalation requests.
  uint32 queue_depth = 3;
}

service ArbitrationService {
  // Request Tier 2 escalation. Returns GRANTED or QUEUED.
  rpc RequestEscalation(EscalationRequest) returns (EscalationResponse);
  // Voluntarily release an escalation before expiry.
  rpc ReleaseEscalation(ReleaseEscalationRequest) returns (ReleaseEscalationResponse);
  // Query current arbitration state — for diagnostics.
  rpc GetArbitrationStatus(ArbitrationStatusRequest) returns (ArbitrationStatusResponse);
}

// ─────────────────────────────────────────────────────────────────────────────
// Process Supervision
// ─────────────────────────────────────────────────────────────────────────────

enum SubsystemState {
  SUBSYSTEM_STATE_UNSPECIFIED = 0;
  STARTING = 1;
  READY = 2;
  RUNNING = 3;
  RESTARTING = 4;
  DEGRADED = 5;
  STOPPED = 6;
  FAILED = 7;
}

message SubsystemStatus {
  string subsystem_id = 1;
  SubsystemState state = 2;
  // Number of restart attempts since last successful start.
  uint32 restart_count = 3;
  // Last error message if state is DEGRADED or FAILED. Safe for cross-process — no debug_context.
  string last_error = 4;
  // Process ID if running.
  uint64 pid = 5;
}

message SupervisorStatusRequest {}

message SupervisorStatusResponse {
  repeated SubsystemStatus subsystems = 1;
}

message RestartSubsystemRequest {
  string subsystem_id = 1;
  // Reason for manual restart — logged.
  string reason = 2;
}

message RestartSubsystemResponse {
  bool accepted = 1;
  string message = 2;
}

service SupervisorService {
  // Query all supervised subsystem states.
  rpc GetStatus(SupervisorStatusRequest) returns (SupervisorStatusResponse);
  // Manually request a subsystem restart. Follows the same retry policy.
  rpc RestartSubsystem(RestartSubsystemRequest) returns (RestartSubsystemResponse);
}

// ─────────────────────────────────────────────────────────────────────────────
// Watchdog
// ─────────────────────────────────────────────────────────────────────────────

message RegisterTaskRequest {
  // Unique task identifier.
  string task_id = 1;
  // Which subsystem/agent owns this task.
  string subsystem_id = 2;
  // Wall-clock timeout in milliseconds. Comes from config per-agent quotas.
  uint64 timeout_ms = 3;
  // Trace context for the operation this task belongs to.
  string trace_context = 4;
}

message RegisterTaskResponse {
  bool registered = 1;
}

message CompleteTaskRequest {
  string task_id = 1;
}

message CompleteTaskResponse {
  bool acknowledged = 1;
}

message WatchdogStatusRequest {}

message WatchdogStatusResponse {
  // Number of currently tracked tasks.
  uint32 active_tasks = 1;
  // Tasks that have been terminated due to timeout since last query.
  repeated string recently_timed_out_task_ids = 2;
}

service WatchdogService {
  // Register a task with the watchdog. Starts the timeout timer.
  rpc RegisterTask(RegisterTaskRequest) returns (RegisterTaskResponse);
  // Signal task completion. Cancels the timeout timer.
  rpc CompleteTask(CompleteTaskRequest) returns (CompleteTaskResponse);
  // Query watchdog state — for diagnostics.
  rpc GetWatchdogStatus(WatchdogStatusRequest) returns (WatchdogStatusResponse);
}

// ─────────────────────────────────────────────────────────────────────────────
// MemoryService
// ─────────────────────────────────────────────────────────────────────────────

// ── MemoryService messages ────────────────────────────────────────────────

message MemoryWriteRequest {
  string text = 1;
  string target_tier = 2; // "short_term" | "long_term" | "episodic"
  string priority = 3; // "reactive" | "background"
  string trace_context = 4;
}

message MemoryWriteResponse {
  bool accepted = 1;
  string entry_id = 2;
}

message MemoryReadRequest {
  string query = 1;
  uint32 limit = 2;
  float min_score = 3;
  string priority = 4; // "reactive" | "background"
  string trace_context = 5;
}

message MemorySearchResult {
  string node_id = 1;
  string summary = 2;
  float score = 3;
  string tier = 4;
}

message MemoryReadResponse {
  repeated MemorySearchResult results = 1;
}

message MemoryPromoteRequest {
  string entry_id = 1;
  string priority = 2; // "reactive" | "background"
  string trace_context = 3;
}

message MemoryPromoteResponse {
  bool promoted = 1;
}

service MemoryService {
  rpc Write(MemoryWriteRequest) returns (MemoryWriteResponse);
  rpc Read(MemoryReadRequest) returns (MemoryReadResponse);
  rpc Promote(MemoryPromoteRequest) returns (MemoryPromoteResponse);
}

// ─────────────────────────────────────────────────────────────────────────────
// Structured Error — Cross-Process Safe
// ─────────────────────────────────────────────────────────────────────────────

// This mirrors the Rust SenaError but only carries fields safe for cross-process
// propagation. debug_context is never included — it stays local to the originating subsystem.

message SenaErrorProto {
  // Machine-readable error code.
  string code = 1;
  // Human-readable message. Never contains prompt content, SoulBox values, or user data.
  string message = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// InferenceService
// ─────────────────────────────────────────────────────────────────────────────

// InferenceService is the single owner of llama-cpp-rs. Every subsystem that
// needs completions is a gRPC client to this service — never direct library
// calls. model-probe, CTP, and the reactive loop all route through here.

// ── InferenceService messages ─────────────────────────────────────────────

message CompleteRequest {
  // Fully assembled TOON-encoded prompt from prompt-composer.
  string prompt = 1;
  // Target model ID from the registry. Empty string means the active model.
  string model_id = 2;
  // Maximum number of tokens to generate.
  uint32 max_tokens = 3;
  // Sampling temperature. 0.0 for deterministic probes; SoulBox-defined for normal inference.
  float temperature = 4;
  // Priority tier mapped to the global PriorityTier enum values.
  int32 priority = 5;
  // Unique per-call trace ID for correlation across subsystems.
  string request_id = 6;
}

message CompleteResponse {
  // The generated completion text.
  string text = 1;
  uint32 tokens_generated = 2;
  uint32 tokens_prompt = 3;
  // Which model actually served the request (may differ from request.model_id if fallback occurred).
  string model_id = 4;
  // Echoed from CompleteRequest for correlation.
  string request_id = 5;
}

message StreamCompleteChunk {
  // One token of the streamed response.
  string token = 1;
  // True on the final chunk; subsequent chunks must not be expected.
  bool finished = 2;
  // Echoed from CompleteRequest for correlation.
  string request_id = 3;
}

// Phase 2 stub — message defined now; implementation deferred.
message ActivationRequest {
  // Which transformer layer to read activations from.
  uint32 layer = 1;
  string request_id = 2;
}

// Phase 2 stub — message defined now; implementation deferred.
message ActivationResponse {
  uint32 layer = 1;
  // Activation vector at the requested layer.
  repeated float values = 2;
  string request_id = 3;
}

// Phase 3 stub — message defined now; implementation deferred.
message SteeringRequest {
  // Which transformer layer to apply the steering vector at.
  uint32 layer = 1;
  // The steering direction vector.
  repeated float direction = 2;
  // How strongly to apply the direction.
  float magnitude = 3;
  string request_id = 4;
}

// Phase 3 stub — message defined now; implementation deferred.
message SteeringAck {
  bool applied = 1;
  string request_id = 2;
}

service InferenceService {
  // Run a full completion. Blocks until generation is complete.
  rpc Complete(CompleteRequest) returns (CompleteResponse);
  // Run a streamed completion. Server pushes one chunk per token.
  rpc StreamComplete(CompleteRequest) returns (stream StreamCompleteChunk);
  // Read transformer layer activations. Phase 2 — stub only; not yet implemented.
  rpc ReadActivations(ActivationRequest) returns (ActivationResponse);
  // Apply a steering vector during generation. Phase 3 — stub only; not yet implemented.
  rpc Steer(SteeringRequest) returns (SteeringAck);
}
